<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MMRC-Dyspnoeskala</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      font-size: 16px;
      max-width: 900px;
    }

    h1 {
      margin-bottom: .5rem;
    }

    .intro {
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .option {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #f8f8f8;
    }

    .option label {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1rem;
      align-items: start;
      cursor: pointer;
    }

    .score-box {
      display: flex;
      align-items: center;
      gap: .7rem;
      color: #666;
      font-size: 15px;
      min-width: 70px;
    }

    .score-box input {
      transform: scale(1.25);
      margin-top: 1px;
    }

    .score-number {
      font-weight: bold;
      font-size: 18px;
      color: #222;
    }

    .description {
      line-height: 1.5;
    }

    button {
      padding: 10px 15px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 24px;
      font-weight: bold;
      font-size: 18px;
    }

    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 3rem;
    }

    @media (max-width: 700px) {
      .option label {
        grid-template-columns: 1fr;
        gap: .8rem;
      }

      .score-box {
        margin-bottom: .2rem;
      }
    }
  </style>
</head>

<body>

<h1>MMRC-Score</h1>

<p class="intro">
  Skala zur Bewertung der Atemnot bei COPD.
  Ergänzend zum CAT kann die Modified Medical Research Council (MMRC-) Dyspnoeskala verwendet werden.
  <br><br>
  Im Behandlungsplan als <strong>Messung</strong> eintragen.
</p>

<form id="mmrcForm">

  <div class="option">
    <label>
      <div class="score-box">
        <input type="radio" name="mmrc" value="0">
        <div class="score-number">0</div>
      </div>

      <div class="description">
        Ich bekomme nur Atemnot bei sehr starker Belastung.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <div class="score-box">
        <input type="radio" name="mmrc" value="1">
        <div class="score-number">1</div>
      </div>

      <div class="description">
        Ich bekomme Atemnot bei schnellem Gehen in der Ebene oder bei leichter Steigung.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <div class="score-box">
        <input type="radio" name="mmrc" value="2">
        <div class="score-number">2</div>
      </div>

      <div class="description">
        Wegen meiner Atemnot bin ich beim Gehen langsamer im Vergleich zu Personen gleichen Alters
        ODER gezwungen zum Stehenbleiben beim Gehen in der Ebene.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <div class="score-box">
        <input type="radio" name="mmrc" value="3">
        <div class="score-number">3</div>
      </div>

      <div class="description">
        Ich muss bei einer Gehstrecke von 100 Metern oder nach 2 Minuten stehen bleiben.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <div class="score-box">
        <input type="radio" name="mmrc" value="4">
        <div class="score-number">4</div>
      </div>

      <div class="description">
        Ich kann wegen meiner Atemnot das Haus nicht verlassen oder komme beim An- und Ausziehen ausser Atem.
      </div>
    </label>
  </div>

</form>

<button type="button" onclick="calculateMMRC()">
  ✅ Score berechnen
</button>

<div id="result"></div>

<div class="footer-nav">
  <button onclick="goBack()">⬅️ Zurück</button>
  <button onclick="window.location.href='index.html'">🏠 Hauptseite</button>
</div>

<script>
function calculateMMRC() {
  const selected = document.querySelector('input[name="mmrc"]:checked');

  if (!selected) {
    document.getElementById("result").innerText =
      "Bitte eine Antwort auswählen.";
    return;
  }

  const score = selected.value;

  document.getElementById("result").innerText =
    `MMRC-Score: ${score} / 4`;
}

function goBack() {
  if (document.referrer && document.referrer !== window.location.href) {
    history.back();
  } else {
    window.location.href = 'index.html';
  }
}
</script>

</body>
</html>
