<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MMRC-Dyspnoeskala</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      font-size: 16px;
      max-width: 900px;
    }

    h1 {
      margin-bottom: .5rem;
    }

    .intro {
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .option {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #f8f8f8;
    }

    .option label {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      cursor: pointer;
    }

    .option input {
      margin-top: .25rem;
      transform: scale(1.3);
    }

    .score {
      font-weight: bold;
      min-width: 24px;
    }

    button {
      padding: 10px 15px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 24px;
      font-weight: bold;
      font-size: 18px;
    }

    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 3rem;
    }
  </style>
</head>

<body>

<h1>MMRC-Score</h1>

<p class="intro">
 Skala zur Bewertung der Atemnot bei COPD. Kann Ergänzend zum CAT kann die Modified Medical Research Council (MMRC-) Dyspnoeskala verwendet werden. Im Behandlungsplan als <strong> Messung </strong> eintragen
  <br>

</p>

<form id="mmrcForm">

  <div class="option">
    <label>
      <input type="radio" name="mmrc" value="0">
      <div>
        <div class="score">0</div>
        Ich bekomme nur Atemnot bei sehr starker Belastung.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <input type="radio" name="mmrc" value="1">
      <div>
        <div class="score">1</div>
        Ich bekomme Atemnot bei schnellem Gehen in der Ebene oder bei leichter Steigung.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <input type="radio" name="mmrc" value="2">
      <div>
        <div class="score">2</div>
        Wegen meiner Atemnot bin ich beim Gehen langsamer im Vergleich zu Personen gleichen Alters
        ODER gezwungen zum Stehenbleiben beim Gehen in der Ebene.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <input type="radio" name="mmrc" value="3">
      <div>
        <div class="score">3</div>
        Ich muss bei einer Gehstrecke von 100 Metern oder nach 2 Minuten stehen bleiben.
      </div>
    </label>
  </div>

  <div class="option">
    <label>
      <input type="radio" name="mmrc" value="4">
      <div>
        <div class="score">4</div>
        Ich kann wegen meiner Atemnot das Haus nicht verlassen oder komme beim An- und Ausziehen ausser Atem.
      </div>
    </label>
  </div>

</form>

<button type="button" onclick="calculateMMRC()">
  ✅ Score berechnen
</button>

<div id="result"></div>

<div class="footer-nav">
  <button onclick="goBack()">⬅️ Zurück</button>
  <button onclick="window.location.href='index.html'">🏠 Hauptseite</button>
</div>

<script>
function calculateMMRC() {
  const selected = document.querySelector('input[name="mmrc"]:checked');

  if (!selected) {
    document.getElementById("result").innerText =
      "Bitte eine Antwort auswählen.";
    return;
  }

  const score = selected.value;

  document.getElementById("result").innerText =
    `MMRC-Score: ${score} / 4`;
}

function goBack() {
  if (document.referrer && document.referrer !== window.location.href) {
    history.back();
  } else {
    window.location.href = 'index.html';
  }
}
</script>

</body>
</html>
